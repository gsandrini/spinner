<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spinner</title>
  <meta name="description" content="A simple prize wheel — tap Go to spin and discover your number."/>
  <meta property="og:title" content="Spinner"/>
  <meta property="og:description" content="A simple prize wheel — tap Go to spin and discover your number."/>
  <meta property="og:type" content="website"/>
  <link rel="stylesheet" type="text/css" href="assets/css/tailwind.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script defer src="assets/js/alpine.min.js"></script>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png"/>
</head>

<body class="font-mono text-[13px] min-h-screen" x-data="SpinnerApp()" x-cloak>
<div class="max-w-lg mx-auto px-4 py-12">
  <div class="mb-8">
    <div class="flex items-center justify-between mb-1">
      <span class="text-lg font-medium tracking-tight" x-text="t.title"></span>
      <button @click="toggleLang()" class="btn-secondary text-[11px] px-2.5 py-1 rounded-md"
              x-text="lang === 'it' ? 'EN' : 'IT'" title="Switch language"></button>
    </div>
  </div>
  <div class="card mb-4">
    <div class="wheel-wrapper">
      <div class="pointer"></div>
      <img
          src="assets/images/spinner.svg"
          class="wheel-svg"
          :class="{ spin: mode === 'spin' }"
          :style="`--dur:${dur}s; transform: rotate(${deg}deg)`"
          @transitionend="onEnd"
          alt=""/>
    </div>
    <div class="result-area">
      <div class="result-box" x-show="result !== null">
        <div class="result-label">Risultato</div>
        <div class="result-number" x-text="result"></div>
      </div>
    </div>
    <div class="buttons">
      <button class="btn-reset" :disabled="busy || deg === home" @click="reset()">
        <span x-text="t.reset"></span>
      </button>
      <button class="btn-spin" :disabled="busy" @click="spin()">
        <span x-text="t.turn"></span>
      </button>
    </div>
  </div>
  <div class="divider pt-5 flex items-center justify-center text-[11px]">
      <span class="text-muted" style="opacity:0.7">
        <span x-text="t.madeWith"></span>
        <a href="https://claude.ai" target="_blank" rel="noopener" class="footer-link">Claude</a>
        (Anthropic)
      </span>
  </div>
</div>
<script src="assets/js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/spinner/sw.js');
  }
</script>
</body>

</html>
